<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listening Regulation O₂ Rhythm</title>

    <!-- Match the rest of your protocols -->
    <link rel="stylesheet" href="/assets/style.css" />

    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5NKZ7XYYWF"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-5NKZ7XYYWF', { page_title: document.title, page_path: location.pathname });
    </script>

    <style>
        /* light add-ons only */
        .choiceRow {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 12px;
        }

        .choiceBtn {
            width: 100%;
            padding: 12px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.92);
            cursor: pointer;
            font-size: 13px;
            letter-spacing: .02em;
        }

        .choiceBtn:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .choiceBtn.active {
            background: rgba(255, 255, 255, 0.10);
            border-color: rgba(255, 255, 255, 0.22);
        }

        .endMsg {
            margin-top: 12px;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.92);
            line-height: 1.35;
            display: none;
        }

        .endMsg strong {
            display: block;
            margin-bottom: 6px;
            letter-spacing: .02em;
        }
    </style>
</head>

<body data-agency="academy" data-environment="training">
    <main class="wrap">
        <section class="card protocol" data-protocol-id="academy_listening_directional">

            <div class="brand">O₂ RHYTHM</div>

            <h1>Listening Regulation • Directional Audio</h1>
            <p class="sub">Choose 1 min / 2 min / 3 min • headphones recommended</p>
            <p class="sub" style="margin-top:-10px;">Use: overload • noise reactivity • pre-contact focus</p>

            <div class="ringbox">
                <svg class="progressRing" viewBox="0 0 220 220" aria-hidden="true">
                    <circle class="progress-bg" cx="110" cy="110" r="100"></circle>
                    <circle class="progress" cx="110" cy="110" r="100"></circle>
                </svg>

                <div class="pacer">
                    <div class="center">
                        <button id="startBtn" class="start" type="button">START</button>
                        <div id="timer" class="timer">1:00</div>
                        <div id="phaseLabel" class="phaseLabel">READY</div>
                    </div>
                </div>
            </div>

            <div class="choiceRow" aria-label="Duration selection">
                <button class="choiceBtn active" type="button" data-seconds="60" id="opt60">1 MIN</button>
                <button class="choiceBtn" type="button" data-seconds="120" id="opt120">2 MIN</button>
                <button class="choiceBtn" type="button" data-seconds="192" id="opt192">3 MIN</button>
            </div>

            <div class="toggleRow" style="margin-top:12px;">
                <button id="soundToggle" class="toggle" type="button">SOUND: ON</button>
            </div>

            <div id="endMsg" class="endMsg">
                <strong>This listening regulation has ended.</strong>
                If you need more time, run it again. Otherwise, resume duties.
            </div>

            <div class="navrow">
                <a class="pill" href="/academy/">Back</a>
            </div>

            <div class="feedback">
                <a class="feedback-link" href="feedback.html?src=academy&protocol=listening-directional" target="_blank"
                    rel="noopener">
                    Feedback (30 seconds)
                </a>
            </div>

            <!-- Audio -->
            <audio id="track" preload="auto" src="/assets/audio/directional-listening.mp3"></audio>

        </section>
    </main>

    <script>
        // ============================================================
        // Listening Regulation — Directional Audio (MP3)
        // - User chooses 1/2/3 min
        // - Fades out smoothly at end (no abrupt stop)
        // - Uses your existing ring/timer look
        // ============================================================

        const track = document.getElementById("track");

        const startBtn = document.getElementById("startBtn");
        const timerEl = document.getElementById("timer");
        const labelEl = document.getElementById("phaseLabel");
        const endMsgEl = document.getElementById("endMsg");
        const soundToggle = document.getElementById("soundToggle");

        const choiceBtns = Array.from(document.querySelectorAll(".choiceBtn"));

        // progress ring
        const circle = document.querySelector("circle.progress");
        const r = 100;
        const circ = 2 * Math.PI * r;
        circle.style.strokeDasharray = `${circ} ${circ}`;
        circle.style.strokeDashoffset = `${circ}`;
        function setProgress(pct) {
            circle.style.strokeDashoffset = (circ - (pct * circ));
        }
        setProgress(0);

        // Duration options
        // File is 3:12 = 192 seconds
        const MAX_LEN = 192;
        let selectedSeconds = 60;

        // Sound + volume handling
        let soundOn = true;
        track.volume = 1.0;
        track.muted = false;

        // Run state
        let running = false;
        let raf = null;
        let fadeTimer = null;
        let endAt = 0;         // target end time in seconds (audio timeline)
        let endScheduled = false;

        const FADE_SECONDS = 2.0;  // smooth fade at end

        function fmt(sec) {
            const s = Math.max(0, Math.ceil(sec));
            const m = Math.floor(s / 60);
            const rem = s % 60;
            return `${m}:${String(rem).padStart(2, "0")}`;
        }

        function showEnd() { endMsgEl.style.display = "block"; }
        function hideEnd() { endMsgEl.style.display = "none"; }

        function setActiveChoice(btn) {
            choiceBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            selectedSeconds = Number(btn.dataset.seconds) || 60;

            // Update timer display if idle
            if (!running) {
                timerEl.textContent = fmt(selectedSeconds);
                setProgress(0);
                labelEl.textContent = "READY";
                hideEnd();
            }
        }

        // Prevent changing duration mid-run (keeps behavior predictable)
        function lockChoices(lock) {
            choiceBtns.forEach(b => b.disabled = lock);
            choiceBtns.forEach(b => b.style.opacity = lock ? "0.6" : "1");
        }

        function stopInternal(status, showEndMsg) {
            running = false;
            endScheduled = false;

            startBtn.textContent = "START";
            labelEl.textContent = status;

            if (raf) cancelAnimationFrame(raf);
            raf = null;

            if (fadeTimer) {
                clearInterval(fadeTimer);
                fadeTimer = null;
            }

            try { track.pause(); } catch (_) { }

            // Reset volume so next run isn't stuck quiet
            track.volume = soundOn ? 1.0 : 1.0;

            lockChoices(false);

            if (showEndMsg) showEnd();
            else hideEnd();
        }

        function scheduleFadeOut() {
            if (fadeTimer) return;

            // Fade out over FADE_SECONDS using small steps
            const steps = 20;
            const stepMs = (FADE_SECONDS * 1000) / steps;
            const startVol = track.volume;
            let i = 0;

            fadeTimer = setInterval(() => {
                i++;
                const pct = i / steps;
                const v = Math.max(0, startVol * (1 - pct));
                track.volume = v;

                if (i >= steps) {
                    clearInterval(fadeTimer);
                    fadeTimer = null;

                    // Pause once silent, then mark complete
                    try { track.pause(); } catch (_) { }
                    track.currentTime = 0; // reset for next run
                    track.volume = soundOn ? 1.0 : 1.0;

                    setProgress(1);
                    timerEl.textContent = "00:00";
                    stopInternal("DONE", true);

                    try {
                        gtag("event", "protocol_complete", {
                            protocol: "listening_directional",
                            duration_selected: selectedSeconds,
                            agency: document.body.dataset.agency || "",
                            environment: document.body.dataset.environment || ""
                        });
                    } catch (_) { }
                }
            }, stepMs);
        }

        function updateLoop() {
            if (!running) return;

            const t = track.currentTime || 0;

            // Remaining is based on selected duration, not file length
            const remain = Math.max(0, selectedSeconds - t);
            timerEl.textContent = fmt(remain);

            setProgress(Math.min(1, t / selectedSeconds));

            // When we hit the selected duration, fade out (do not abruptly stop)
            if (!endScheduled && t >= Math.max(0, selectedSeconds - FADE_SECONDS)) {
                endScheduled = true;
                scheduleFadeOut();
            }

            raf = requestAnimationFrame(updateLoop);
        }

        async function startStop() {
            if (running) {
                stopInternal("STOPPED", false);
                try { gtag("event", "protocol_stop", { protocol: "listening_directional", duration_selected: selectedSeconds }); } catch (_) { }
                return;
            }

            hideEnd();

            // Ensure selected duration never exceeds file length
            selectedSeconds = Math.min(selectedSeconds, MAX_LEN);

            // Reset track
            track.currentTime = 0;
            track.volume = 1.0;
            track.muted = !soundOn;

            running = true;
            startBtn.textContent = "STOP";
            labelEl.textContent = "RUNNING";
            lockChoices(true);

            try {
                await track.play();
            } catch (_) {
                // If play fails (autoplay restrictions), revert state cleanly
                stopInternal("READY", false);
                return;
            }

            try {
                gtag("event", "protocol_start", {
                    protocol: "listening_directional",
                    duration_selected: selectedSeconds
                });
            } catch (_) { }

            raf = requestAnimationFrame(updateLoop);
        }

        // SOUND toggle
        soundToggle.addEventListener("click", () => {
            soundOn = !soundOn;
            soundToggle.textContent = `SOUND: ${soundOn ? "ON" : "OFF"}`;
            track.muted = !soundOn;
        });

        // Choice buttons
        choiceBtns.forEach(btn => btn.addEventListener("click", () => setActiveChoice(btn)));

        // Start/Stop
        startBtn.addEventListener("click", startStop);

        // Initial UI
        timerEl.textContent = fmt(selectedSeconds);
        labelEl.textContent = "READY";
        hideEnd();
    </script>
</body>

</html>
