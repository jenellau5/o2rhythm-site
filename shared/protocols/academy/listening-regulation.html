<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>O₂ Rhythm — Directional Listening Regulation</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #0b0b0d;
            color: #f5f5f7;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
        }

        .wrap {
            width: min(560px, 100%);
            display: grid;
            gap: 14px;
        }

        .card {
            background: #121217;
            border: 1px solid #242430;
            border-radius: 16px;
            padding: 18px;
        }

        .brand {
            letter-spacing: .22em;
            font-size: 12px;
            color: #a6a6b3;
        }

        h1 {
            margin: 8px 0 6px;
            font-size: 18px;
        }

        p {
            margin: 6px 0 0;
            color: #a6a6b3;
            line-height: 1.45;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #242430;
            background: #1a1a23;
            color: #f5f5f7;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #222233;
        }

        .row {
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr 1fr;
        }

        label {
            display: block;
            font-size: 12px;
            color: #a6a6b3;
            margin: 10px 0 6px;
        }

        input[type="range"] {
            width: 100%;
        }

        .hint {
            font-size: 12px;
            color: #a6a6b3;
            margin-top: 10px;
        }

        .status {
            font-size: 12px;
            color: #a6a6b3;
            margin-top: 10px;
        }

        .mono {
            opacity: .8;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <main class="wrap">
        <section class="card">
            <div class="brand">O₂ RHYTHM</div>
            <h1>Directional Listening Regulation (60s)</h1>
            <p>
                A 60-second spatial awareness reset. Follow the sound as it shifts direction.
            </p>
            <p class="hint" style="margin-top:10px;">
                <strong>Headphones recommended.</strong><br>
                Directional sound works best when audio is isolated to each ear.
            </p>
        </section>

        <section class="card">
            <div class="row">
                <button id="startBtn">Start 60s Reset</button>
                <button id="stopBtn" disabled>Stop</button>
            </div>

            <label for="vol">Volume</label>
            <input id="vol" type="range" min="0" max="1" step="0.01" value="0.35" />

            <div class="status" id="status">Status: idle</div>
            <div class="hint">Flow: Left → Right → “Behind-ish” → Alternating → Center</div>
        </section>
    </main>

    <script>
        // Directional Listening Reset (60s) — Web Audio (no file downloads)
        // Works best with headphones.

        let ctx = null;
        let master = null;
        let running = false;
        let stopTimer = null;

        const statusEl = document.getElementById("status");
        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        const volSlider = document.getElementById("vol");

        function setStatus(msg) {
            statusEl.textContent = `Status: ${msg}`;
        }

        function makePinkishNoiseBuffer(audioCtx, seconds = 2) {
            // Simple "pink-ish" noise: white noise run through a lowpass later.
            const rate = audioCtx.sampleRate;
            const frameCount = Math.floor(rate * seconds);
            const buffer = audioCtx.createBuffer(1, frameCount, rate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < frameCount; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.25; // conservative amplitude
            }
            return buffer;
        }

        function expRampParam(param, atTime, from, to, dur) {
            // Safer tiny ramps to avoid clicks.
            param.setValueAtTime(from, atTime);
            param.exponentialRampToValueAtTime(Math.max(to, 0.0001), atTime + dur);
        }

        function scheduleSegmentPan(panner, t0, t1, panFrom, panTo) {
            // Linear is fine for pan.
            panner.pan.setValueAtTime(panFrom, t0);
            panner.pan.linearRampToValueAtTime(panTo, t1);
        }

        async function startReset() {
            if (running) return;

            // Must be created/resumed from user gesture
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === "suspended") await ctx.resume();

            running = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            setStatus("running (60s)");

            const now = ctx.currentTime;
            const total = 60;

            // Master
            master = ctx.createGain();
            master.gain.value = Number(volSlider.value);
            master.connect(ctx.destination);

            // Soft tone (sine) + gentle noise bed
            const toneOsc = ctx.createOscillator();
            toneOsc.type = "sine";
            toneOsc.frequency.value = 160; // low, calm

            const toneGain = ctx.createGain();
            toneGain.gain.value = 0.0;

            const panner = ctx.createStereoPanner();

            // Noise source (looped buffer)
            const noiseSrc = ctx.createBufferSource();
            noiseSrc.buffer = makePinkishNoiseBuffer(ctx, 2);
            noiseSrc.loop = true;

            const noiseLP = ctx.createBiquadFilter();
            noiseLP.type = "lowpass";
            noiseLP.frequency.value = 900; // keep it soft
            noiseLP.Q.value = 0.7;

            const noiseGain = ctx.createGain();
            noiseGain.gain.value = 0.0;

            // A little "depth" effect (behind-ish): quieter + darker + tiny reverb-ish smear.
            // We'll approximate with another lowpass and a short delay feedback.
            const depthLP = ctx.createBiquadFilter();
            depthLP.type = "lowpass";
            depthLP.frequency.value = 450;
            depthLP.Q.value = 0.6;

            const delay = ctx.createDelay(0.25);
            delay.delayTime.value = 0.09; // subtle

            const fb = ctx.createGain();
            fb.gain.value = 0.18; // subtle feedback

            // routing: (tone + noise) -> panner -> (optional depth chain blend) -> master
            // We'll do: panner -> depthLP -> delay -> master, with feedback loop.
            // And also direct panner -> master so it doesn't feel "echoey" all the time.

            const direct = ctx.createGain();
            direct.gain.value = 1.0;

            const depthBlend = ctx.createGain();
            depthBlend.gain.value = 0.0; // only raise during "behind-ish" segment

            // Build graph
            toneOsc.connect(toneGain);
            toneGain.connect(panner);

            noiseSrc.connect(noiseLP);
            noiseLP.connect(noiseGain);
            noiseGain.connect(panner);

            panner.connect(direct);
            direct.connect(master);

            panner.connect(depthBlend);
            depthBlend.connect(depthLP);
            depthLP.connect(delay);
            delay.connect(master);

            // feedback loop (tiny)
            delay.connect(fb);
            fb.connect(delay);

            // Start sources
            toneOsc.start(now);
            noiseSrc.start(now);

            // Envelope to avoid clicks
            // Fade in over 1s, fade out last 1s
            expRampParam(toneGain.gain, now, 0.0001, 0.10, 1.0);
            expRampParam(noiseGain.gain, now, 0.0001, 0.06, 1.2);

            // --- Pan Timeline (60s) ---
            // 0-15: Left focus
            // 15-30: Right focus
            // 30-40: "Behind-ish" (center + depth blend)
            // 40-55: Alternating slow sweep
            // 55-60: Center settle + fade out

            // Segment 1: Left (set and gently drift)
            scheduleSegmentPan(panner, now + 0, now + 15, -0.85, -0.65);

            // Segment 2: Right
            scheduleSegmentPan(panner, now + 15, now + 30, 0.65, 0.85);

            // Segment 3: Behind-ish (center + depth blend up)
            scheduleSegmentPan(panner, now + 30, now + 40, 0.0, 0.0);
            depthBlend.gain.setValueAtTime(0.0001, now + 30);
            depthBlend.gain.linearRampToValueAtTime(0.65, now + 32);
            depthBlend.gain.linearRampToValueAtTime(0.65, now + 38);
            depthBlend.gain.linearRampToValueAtTime(0.0001, now + 40);

            // Segment 4: Alternating (slow left-right sweeps)
            // We'll schedule a few sweeps manually.
            const s4 = now + 40;
            const sweeps = [
                [s4 + 0, s4 + 3.5, -0.8, 0.8],
                [s4 + 3.5, s4 + 7.0, 0.8, -0.8],
                [s4 + 7.0, s4 + 10.5, -0.8, 0.8],
                [s4 + 10.5, s4 + 15.0, 0.8, 0.0], // settle toward center by 55s
            ];
            for (const [a, b, from, to] of sweeps) {
                scheduleSegmentPan(panner, a, b, from, to);
            }

            // Segment 5: Center + fade out
            scheduleSegmentPan(panner, now + 55, now + 60, 0.0, 0.0);
            // Fade out
            expRampParam(toneGain.gain, now + 59, Math.max(toneGain.gain.value, 0.0001), 0.0001, 1.0);
            expRampParam(noiseGain.gain, now + 59, Math.max(noiseGain.gain.value, 0.0001), 0.0001, 1.0);

            // Hard stop after 60.2s
            stopTimer = setTimeout(() => stopReset(), (total + 0.3) * 1000);
        }

        function stopReset() {
            if (!running) return;

            running = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            setStatus("stopped");

            if (stopTimer) {
                clearTimeout(stopTimer);
                stopTimer = null;
            }

            try {
                if (ctx) {
                    // Close context cleanly
                    ctx.close();
                }
            } catch (e) { /* ignore */ }

            ctx = null;
            master = null;
        }

        // UI
        startBtn.addEventListener("click", startReset);
        stopBtn.addEventListener("click", stopReset);

        volSlider.addEventListener("input", () => {
            if (master) master.gain.value = Number(volSlider.value);
        });
    </script>
</body>

</html>
