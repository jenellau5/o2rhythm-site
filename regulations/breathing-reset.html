<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O₂ Rhythm | 60 Second Reset</title>

    <style>
        :root {
            --bg-1: #f8faf7;
            --bg-2: #e9f1ed;
            --card: rgba(255, 255, 255, 0.86);
            --text: #111514;
            --muted: #66716c;
            --soft: #edf5f1;
            --line: #dce7e1;
            --accent: #79b59f;
            --accent-dark: #376f61;
            --accent-light: #d9eee7;
            --shadow: 0 30px 90px rgba(20, 41, 34, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 8%, rgba(121, 181, 159, 0.32), transparent 30%),
                radial-gradient(circle at 85% 18%, rgba(217, 238, 231, 0.9), transparent 26%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2));
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }

        button {
            font: inherit;
        }

        .app {
            width: min(100%, 430px);
            min-height: min(780px, calc(100vh - 28px));
            display: flex;
            flex-direction: column;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.88);
            border-radius: 42px;
            overflow: hidden;
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
        }

        .header {
            padding: 24px 26px 4px;
            text-align: center;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(121, 181, 159, 0.12);
            color: var(--accent-dark);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--accent-dark);
        }

        h1 {
            margin: 0;
            font-size: clamp(40px, 12vw, 62px);
            line-height: 0.9;
            letter-spacing: -0.08em;
        }

        .subhead {
            display: none;
        }

        .stage {
            flex: 1;
            min-height: 420px;
            position: relative;
            display: grid;
            place-items: center;
            padding: 10px 20px 0;
        }

        .breath-zone {
            position: relative;
            width: 260px;
            height: 260px;
            display: grid;
            place-items: center;
        }

        .outer-halo,
        .middle-halo,
        .breath-orb {
            position: absolute;
            border-radius: 999px;
            transform: scale(0.82);
            transition-property: transform, opacity, box-shadow;
            transition-timing-function: cubic-bezier(0.42, 0, 0.18, 1);
        }

        .outer-halo {
            width: 220px;
            height: 220px;
            background: rgba(121, 181, 159, 0.08);
            opacity: 0.8;
        }

        .middle-halo {
            width: 178px;
            height: 178px;
            border: 1px solid rgba(55, 111, 97, 0.18);
            background: rgba(255, 255, 255, 0.28);
            opacity: 0.92;
        }

        .breath-orb {
            width: 132px;
            height: 132px;
            background: radial-gradient(circle at 35% 28%, #ffffff, var(--accent-light));
            border: 2px solid rgba(121, 181, 159, 0.56);
            box-shadow:
                0 0 0 18px rgba(121, 181, 159, 0.08),
                0 20px 60px rgba(55, 111, 97, 0.18),
                inset 0 0 34px rgba(121, 181, 159, 0.24);
        }

        .breath-zone.inhale .outer-halo,
        .breath-zone.inhale .middle-halo,
        .breath-zone.inhale .breath-orb {
            transform: scale(1.52);
            transition-duration: 4s;
        }

        .breath-zone.exhale .outer-halo,
        .breath-zone.exhale .middle-halo,
        .breath-zone.exhale .breath-orb {
            transform: scale(0.82);
            transition-duration: 6s;
        }

        .breath-zone.inhale .outer-halo {
            opacity: 0.95;
        }

        .breath-zone.exhale .outer-halo {
            opacity: 0.44;
        }

        .instruction {
            position: relative;
            z-index: 3;
            text-align: center;
            pointer-events: none;
            padding: 12px;
        }

        .phase {
            font-size: 31px;
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 8px;
        }

        .number {
            font-size: 58px;
            font-weight: 950;
            letter-spacing: -0.1em;
            line-height: 0.9;
            color: var(--accent-dark);
        }

        .microcopy {
            margin-top: 13px;
            font-size: 14px;
            color: var(--muted);
            line-height: 1.3;
        }

        .mode-label {
            position: absolute;
            bottom: 18px;
            left: 24px;
            right: 24px;
            text-align: center;
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 900;
            opacity: 0.7;
        }

        .breath-line-wrap {
            position: absolute;
            left: 34px;
            right: 34px;
            bottom: 48px;
            height: 8px;
            border-radius: 999px;
            background: rgba(55, 111, 97, 0.10);
            overflow: hidden;
            pointer-events: none;
        }

        .breath-line-fill {
            width: 100%;
            height: 100%;
            border-radius: inherit;
            background: rgba(55, 111, 97, 0.42);
            transform: scaleX(0.08);
            transform-origin: left center;
            transition-property: transform;
            transition-timing-function: cubic-bezier(0.42, 0, 0.18, 1);
        }

        .breath-zone.inhale~.breath-line-wrap .breath-line-fill {
            transform: scaleX(1);
            transition-duration: 4s;
        }

        .breath-zone.exhale~.breath-line-wrap .breath-line-fill {
            transform: scaleX(0.08);
            transition-duration: 6s;
        }

        .progress-section {
            padding: 0 26px 16px;
        }

        .progress-track {
            width: 100%;
            height: 11px;
            border-radius: 999px;
            background: #e2ebe5;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            transition: width 0.22s linear;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 10px;
            font-size: 13px;
            color: var(--muted);
        }

        .controls {
            padding: 18px 22px 24px;
            border-top: 1px solid rgba(220, 231, 225, 0.7);
            background: rgba(255, 255, 255, 0.64);
        }

        .main-buttons,
        .mode-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .main-buttons {
            margin-bottom: 10px;
        }

        .btn {
            min-height: 56px;
            border: 0;
            border-radius: 22px;
            padding: 14px 16px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 900;
            transition: transform 0.16s ease, opacity 0.16s ease, background 0.16s ease, border-color 0.16s ease;
            box-shadow: 0 10px 28px rgba(20, 41, 34, 0.08);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--text);
            color: white;
            grid-column: span 2;
            min-height: 64px;
            font-size: 17px;
        }

        .btn-secondary {
            background: var(--soft);
            color: var(--accent-dark);
            display: none;
        }

        .btn-mode {
            background: #f4f7f4;
            color: #3f4944;
            border: 1px solid var(--line);
        }

        .btn-mode.active {
            background: var(--accent-dark);
            border-color: var(--accent-dark);
            color: white;
        }

        .footer-note {
            margin: 13px auto 0;
            max-width: 320px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
            font-weight: 800;
            letter-spacing: 0.03em;
        }

        .visual-muted .outer-halo,
        .visual-muted .middle-halo,
        .visual-muted .breath-orb,
        .visual-muted .breath-line-wrap {
            opacity: 0.06 !important;
        }

        @media (max-width: 380px) {
            body {
                padding: 10px;
            }

            .app {
                border-radius: 28px;
            }

            .header {
                padding-top: 24px;
            }

            .stage {
                min-height: 330px;
            }

            .breath-zone {
                width: 230px;
                height: 230px;
            }

            .phase {
                font-size: 27px;
            }

            .number {
                font-size: 50px;
            }
        }
    </style>
</head>

<body>
    <main class="app" id="app">
        <header class="header">
            <div class="brand"><span class="dot"></span> O₂ Rhythm</div>
            <h1>Reset</h1>
        </header>

        <section class="stage" id="stage" aria-live="polite">
            <div class="breath-zone" id="breathZone">
                <div class="outer-halo"></div>
                <div class="middle-halo"></div>
                <div class="breath-orb"></div>

                <div class="instruction">
                    <div class="phase" id="phase">Ready</div>
                    <div class="number" id="count">60</div>
                    <div class="microcopy" id="microcopy">Tap start when ready.</div>
                </div>
            </div>

            <div class="breath-line-wrap" aria-hidden="true">
                <div class="breath-line-fill"></div>
            </div>

            <div class="mode-label" id="modeLabel">Visual mode ready</div>
        </section>

        <section class="progress-section">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="meta">
                <span id="cycleText">0 of 6 cycles</span>
                <span>4 in / 6 out</span>
            </div>
        </section>

        <section class="controls">
            <div class="main-buttons">
                <button class="btn btn-primary" id="startBtn">Begin</button>
                <button class="btn btn-secondary" id="resetBtn">Reset</button>
            </div>

            <div class="mode-buttons">
                <button class="btn btn-mode active" id="visualBtn">Visual</button>
                <button class="btn btn-mode" id="toneBtn">Chime</button>
            </div>

            <p class="footer-note">60 seconds • 4 in / 6 out</p>
        </section>
    </main>

    <script>
        const TOTAL_SECONDS = 60;
        const INHALE_SECONDS = 4;
        const EXHALE_SECONDS = 6;
        const CYCLE_SECONDS = INHALE_SECONDS + EXHALE_SECONDS;
        const TOTAL_CYCLES = TOTAL_SECONDS / CYCLE_SECONDS;

        const app = document.getElementById('app');
        const stage = document.getElementById('stage');
        const breathZone = document.getElementById('breathZone');
        const phase = document.getElementById('phase');
        const count = document.getElementById('count');
        const microcopy = document.getElementById('microcopy');
        const progressFill = document.getElementById('progressFill');
        const cycleText = document.getElementById('cycleText');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const visualBtn = document.getElementById('visualBtn');
        const toneBtn = document.getElementById('toneBtn');
        const modeLabel = document.getElementById('modeLabel');

        let audioContext = null;
        let timer = null;
        let startTime = null;
        let pausedElapsed = 0;
        let isRunning = false;
        let visualOn = true;
        let chimeOn = false;
        let lastPhase = null;

        function getAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }

        function playTransitionChime(type) {
            if (!chimeOn) return;

            const ctx = getAudioContext();
            const now = ctx.currentTime;
            const master = ctx.createGain();
            master.gain.setValueAtTime(0.0001, now);
            master.gain.exponentialRampToValueAtTime(0.026, now + 0.06);
            master.gain.exponentialRampToValueAtTime(0.0001, now + 1.15);
            master.connect(ctx.destination);

            const baseFrequency = type === 'inhale' ? 261.63 : 196.0;
            const harmonyFrequency = type === 'inhale' ? 392.0 : 293.66;

            createBellPartial(ctx, master, baseFrequency, now, 1.15, 0.58);
            createBellPartial(ctx, master, harmonyFrequency, now + 0.025, 0.9, 0.12);
        }

        function createBellPartial(ctx, destination, frequency, startAt, duration, volume) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(frequency, startAt);
            osc.frequency.exponentialRampToValueAtTime(frequency * 0.992, startAt + duration);

            gain.gain.setValueAtTime(0.0001, startAt);
            gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.06);
            gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);

            osc.connect(gain);
            gain.connect(destination);
            osc.start(startAt);
            osc.stop(startAt + duration + 0.03);
        }

        function setBreathPhase(type, phaseElapsed) {
            if (lastPhase !== type) {
                lastPhase = type;
                playTransitionChime(type);
            }

            breathZone.classList.remove('inhale', 'exhale');
            breathZone.classList.add(type);

            if (type === 'inhale') {
                phase.textContent = 'Inhale';
                count.textContent = Math.max(INHALE_SECONDS - phaseElapsed, 1);
                microcopy.textContent = 'Let the shape open.';
                modeLabel.textContent = chimeOn ? 'Soft chime: inhale' : 'Visual inhale';
            } else {
                phase.textContent = 'Exhale';
                count.textContent = Math.max(EXHALE_SECONDS - phaseElapsed, 1);
                microcopy.textContent = 'Let your shoulders drop.';
                modeLabel.textContent = chimeOn ? 'Soft chime: exhale' : 'Visual exhale';
            }
        }

        function updateReset() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000) + pausedElapsed;
            const clampedElapsed = Math.min(elapsed, TOTAL_SECONDS);
            const cyclePosition = clampedElapsed % CYCLE_SECONDS;
            const currentCycle = Math.min(Math.floor(clampedElapsed / CYCLE_SECONDS) + 1, TOTAL_CYCLES);

            progressFill.style.width = `${(clampedElapsed / TOTAL_SECONDS) * 100}%`;
            cycleText.textContent = `${clampedElapsed === 0 ? 0 : currentCycle} of ${TOTAL_CYCLES} cycles`;

            if (clampedElapsed >= TOTAL_SECONDS) {
                finishReset();
                return;
            }

            if (cyclePosition < INHALE_SECONDS) {
                setBreathPhase('inhale', cyclePosition);
            } else {
                setBreathPhase('exhale', cyclePosition - INHALE_SECONDS);
            }
        }

        async function startReset() {
            if (isRunning) {
                pauseReset();
                return;
            }

            if (chimeOn) {
                await getAudioContext().resume();
            }

            isRunning = true;
            startTime = Date.now();
            startBtn.textContent = 'Pause';
            stage.classList.add('running');
            updateReset();
            timer = setInterval(updateReset, 200);
        }

        function pauseReset() {
            isRunning = false;
            pausedElapsed += Math.floor((Date.now() - startTime) / 1000);
            clearInterval(timer);
            timer = null;
            startBtn.textContent = 'Resume';
            stage.classList.remove('running');
            modeLabel.textContent = 'Paused';
        }

        function finishReset() {
            isRunning = false;
            pausedElapsed = 0;
            clearInterval(timer);
            timer = null;
            breathZone.classList.remove('inhale', 'exhale');
            phase.textContent = 'Done';
            count.textContent = '✓';
            microcopy.textContent = 'Return when ready.';
            progressFill.style.width = '100%';
            cycleText.textContent = `${TOTAL_CYCLES} of ${TOTAL_CYCLES} cycles`;
            modeLabel.textContent = 'Reset complete';
            startBtn.textContent = 'Begin Again';
            stage.classList.remove('running');
        }

        function resetAll() {
            isRunning = false;
            pausedElapsed = 0;
            clearInterval(timer);
            timer = null;
            lastPhase = null;
            breathZone.classList.remove('inhale', 'exhale');
            phase.textContent = 'Ready';
            count.textContent = '60';
            microcopy.textContent = 'Tap start when ready.';
            progressFill.style.width = '0%';
            cycleText.textContent = `0 of ${TOTAL_CYCLES} cycles`;
            modeLabel.textContent = chimeOn ? 'Chime mode ready' : 'Visual mode ready';
            startBtn.textContent = 'Begin';
            stage.classList.remove('running');
        }

        startBtn.addEventListener('click', startReset);
        resetBtn.addEventListener('click', resetAll);

        visualBtn.addEventListener('click', () => {
            visualOn = !visualOn;
            visualBtn.classList.toggle('active', visualOn);
            visualBtn.textContent = visualOn ? 'Visual' : 'Audio Only';
            app.classList.toggle('visual-muted', !visualOn);
            modeLabel.textContent = visualOn ? 'Visual mode ready' : 'Audio-only mode ready';
        });

        toneBtn.addEventListener('click', async () => {
            chimeOn = !chimeOn;
            toneBtn.classList.toggle('active', chimeOn);
            toneBtn.textContent = chimeOn ? 'Chime On' : 'Chime';

            if (chimeOn) {
                await getAudioContext().resume();
                modeLabel.textContent = 'Soft chime enabled';
                playTransitionChime('inhale');
            } else {
                modeLabel.textContent = visualOn ? 'Visual mode ready' : 'Silent mode';
            }
        });
    </script>
</body>

</html>
