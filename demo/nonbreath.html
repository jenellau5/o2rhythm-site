<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo — Listening Reset • O₂ Rhythm</title>
    <meta name="description" content="1–2 minute listening regulation demo for high-stress operations." />
    <link rel="stylesheet" href="/assets/style.css" />

    <style>
        :root {
            --ring: #ffffff;
        }

        .protocol {
            max-width: 560px;
            margin: 0 auto;
        }

        .demoTop {
            display: grid;
            gap: 6px;
            margin-bottom: 10px;
        }

        .kicker {
            font-size: 12px;
            letter-spacing: 0.12em;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .sub {
            margin: 0;
            opacity: 0.85;
        }

        .hint {
            margin: 8px 0 0 0;
            opacity: 0.78;
            font-size: 13px;
            line-height: 1.35;
        }

        .controlRow {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            margin: 14px 0 12px 0;
        }

        .controlRow label {
            font-size: 12px;
            letter-spacing: 0.08em;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .select {
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: inherit;
            min-width: 110px;
            text-align: center;
        }

        .progressRing {
            width: min(360px, 86vw);
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .promptBox {
            display: grid;
            gap: 10px;
            margin-top: 12px;
            text-align: center;
        }

        .promptTitle {
            font-size: 18px;
            letter-spacing: 0.02em;
            margin: 0;
        }

        .promptText {
            margin: 0;
            opacity: 0.92;
            font-size: 16px;
            line-height: 1.35;
            min-height: 44px;
        }

        .micro {
            margin: 0;
            opacity: 0.75;
            font-size: 12px;
            line-height: 1.35;
        }

        .pillrow {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
            justify-content: center;
        }

        .pillrow a {
            text-decoration: none;
        }

        .miniCta {
            display: grid;
            gap: 10px;
            margin-top: 18px;
            text-align: center;
        }

        .ctaBtn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 14px;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: inherit;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .ctaBtn:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .start {
            min-width: 140px;
        }

        /* --- NO AUDIO CHECKLIST (always bottom, clean, compact) --- */
        .noAudio {
            margin-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.10);
            padding-top: 16px;
        }

        .noAudioHead {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .noAudioTitle {
            margin: 0;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .noAudioReset {
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.06);
            color: inherit;
            border-radius: 10px;
            padding: 8px 10px;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.02em;
            cursor: pointer;
        }

        .noAudioReset:hover {
            background: rgba(255, 255, 255, 0.10);
        }

        .checkGrid {
            display: grid;
            gap: 10px;
        }

        @media (min-width: 520px) {
            .checkGrid {
                grid-template-columns: 1fr 1fr;
                gap: 10px 12px;
            }
        }

        .checkItem {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.05);
        }

        .checkItem:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .checkItem input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #ffffff;
            cursor: pointer;
        }

        .checkItem label {
            cursor: pointer;
            user-select: none;
            opacity: 0.92;
            font-size: 14px;
            line-height: 1.3;
        }

        .checkItem.done {
            opacity: 0.75;
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5NKZ7XYYWF"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-5NKZ7XYYWF');
    </script>
</head>

<body>
    <main class="wrap">
        <section class="card protocol" data-demo="listening_reset">
            <div class="brand">O₂ RHYTHM</div>

            <div class="demoTop">
                <div class="kicker">DEMO • LISTENING REGULATION</div>
                <h1 style="margin:0;">LISTENING RESET</h1>
                <p class="sub">Choose 1:00 or 2:00 • eyes open • stay operational</p>
                <p class="hint"><strong>Headphones recommended</strong> for full effect.</p>
            </div>

            <div class="controlRow" aria-label="Demo controls">
                <label for="durationSel">Duration</label>
                <select id="durationSel" class="select">
                    <option value="60">1:00</option>
                    <option value="120" selected>2:00</option>
                </select>

                <button id="audioToggle" class="toggle" type="button">AUDIO: ON</button>
            </div>

            <div class="ringbox">
                <svg class="progressRing" viewBox="0 0 220 220" aria-hidden="true">
                    <circle class="progress-bg" cx="110" cy="110" r="100"></circle>
                    <circle id="progress" class="progress" cx="110" cy="110" r="100"></circle>
                </svg>

                <div class="pacer">
                    <div class="center">
                        <button id="startBtn" class="start" type="button">START</button>
                        <div id="timer" class="timer">2:00</div>

                        <div class="promptBox" aria-live="polite">
                            <p class="promptTitle" id="promptTitle">Ready</p>
                            <p class="promptText" id="promptText">Select duration. Press START.</p>
                            <p class="micro" id="promptMicro"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Buttons stay ABOVE checklist -->
            <div class="pillrow">
                <a class="pill" href="/demo/" data-track="nav_click" data-cta="demo_home">All demos</a>
                <a class="pill" href="/demo/desk.html" data-track="nav_click" data-cta="back_to_desk">Back: Desk</a>
            </div>

            <div class="miniCta">
                <a class="ctaBtn" href="../index.html#pilot-intake" data-track="cta_click"
                    data-cta="bring_to_agency_from_demo">
                    Bring O₂ Rhythm to My Agency
                </a>
            </div>

            <!-- NO AUDIO OPTION at the bottom, always visible -->
            <div class="noAudio" id="no-audio">
                <div class="noAudioHead">
                    <p class="noAudioTitle">NO AUDIO</p>
                    <button id="resetChecks" class="noAudioReset" type="button">RESET</button>
                </div>

                <div class="checkGrid" id="checkGrid">
                    <div class="checkItem">
                        <input id="c1" type="checkbox" />
                        <label for="c1">Nearest sound</label>
                    </div>

                    <div class="checkItem">
                        <input id="c2" type="checkbox" />
                        <label for="c2">Farthest sound</label>
                    </div>

                    <div class="checkItem">
                        <input id="c3" type="checkbox" />
                        <label for="c3">Mechanical hum (HVAC/computer/radio)</label>
                    </div>

                    <div class="checkItem">
                        <input id="c4" type="checkbox" />
                        <label for="c4">Human sound (footsteps/voices) — no content</label>
                    </div>

                    <div class="checkItem">
                        <input id="c5" type="checkbox" />
                        <label for="c5">One repeating pattern (beep, click, fan cycle)</label>
                    </div>

                    <div class="checkItem">
                        <input id="c6" type="checkbox" />
                        <label for="c6">Silence gap (even half a second)</label>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <script>
        (function () {
            const DEMO_ID = "listening_reset";
            const PAGE_ID = "demo_listening";

            const startBtn = document.getElementById("startBtn");
            const timerEl = document.getElementById("timer");
            const audioToggle = document.getElementById("audioToggle");
            const durationSel = document.getElementById("durationSel");

            const titleEl = document.getElementById("promptTitle");
            const textEl = document.getElementById("promptText");
            const microEl = document.getElementById("promptMicro");

            const progressEl = document.getElementById("progress");

            // Audio file
            const AUDIO_SRC = "/assets/audio/demo-8d.mp3";
            const audio = new Audio(AUDIO_SRC);
            audio.preload = "auto";
            audio.loop = true;
            audio.volume = 1.0;

            // Ring math (SVG circle r=100)
            const r = 100;
            const circumference = 2 * Math.PI * r;
            progressEl.style.strokeDasharray = `${circumference}`;
            progressEl.style.strokeDashoffset = `${circumference}`;

            // State
            let total = 120;
            let running = false;
            let remaining = total;
            let tickInterval = null;
            let audioOn = true;

            // Prompts

            function safeEvent(name, params) {
                try { gtag("event", name, params || {}); } catch (e) { }
            }

            function fmt(sec) {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${String(s).padStart(2, "0")}`;
            }

            function setStepByElapsed(elapsed) {
                let current = steps[0];
                for (const st of steps) if (elapsed >= st.t) current = st;
                titleEl.textContent = current.title;
                textEl.textContent = current.text;
                microEl.textContent = current.micro || "";
            }

            function updateUI() {
                timerEl.textContent = fmt(remaining);
                const progress = (total - remaining) / total;
                const offset = circumference * (1 - progress);
                progressEl.style.strokeDashoffset = `${offset}`;
            }

            function setTotalFromSelector() {
                const v = parseInt(durationSel.value, 10);
                total = Number.isFinite(v) ? v : 120;
                remaining = total;
                timerEl.textContent = fmt(total);
                updateUI();
                safeEvent("demo_duration_set", { demo: DEMO_ID, page: PAGE_ID, seconds: total });
            }

            function stopAudioHard() {
                try {
                    audio.pause();
                    audio.currentTime = 0;
                } catch (e) { }
            }

            function reset() {
                running = false;
                clearInterval(tickInterval);
                tickInterval = null;
                stopAudioHard();

                startBtn.disabled = false;
                startBtn.textContent = "START";

                remaining = total;
                setStepByElapsed(0);
                updateUI();
            }

            function complete() {
                running = false;
                clearInterval(tickInterval);
                tickInterval = null;

                remaining = 0;
                updateUI();

                stopAudioHard();

                startBtn.disabled = false;
                startBtn.textContent = "RESTART";

                titleEl.textContent = "DONE";
                textEl.textContent = "Return to task. You’re back online.";
                microEl.textContent = "";

                safeEvent("demo_complete", { demo: DEMO_ID, page: PAGE_ID, seconds: total, audio: audioOn ? "on" : "off" });
            }

            async function start() {
                if (running) return;

                // Restart path
                if (remaining === 0) {
                    remaining = total;
                    setStepByElapsed(0);
                    updateUI();
                }

                running = true;
                startBtn.disabled = true;

                safeEvent("demo_start", { demo: DEMO_ID, page: PAGE_ID, seconds: total, audio: audioOn ? "on" : "off" });

                if (audioOn) {
                    try { await audio.play(); }
                    catch (e) {
                        audioOn = false;
                        audioToggle.textContent = "AUDIO: OFF";
                        safeEvent("demo_audio_failed", { demo: DEMO_ID, page: PAGE_ID });
                    }
                }

                const startedAt = Date.now();
                let lastStepIndex = -1;

                tickInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - startedAt) / 1000);
                    const newRemaining = Math.max(0, total - elapsed);

                    let stepIndex = 0;
                    for (let i = 0; i < steps.length; i++) {
                        if (elapsed >= steps[i].t) stepIndex = i;
                    }

                    if (stepIndex !== lastStepIndex) {
                        lastStepIndex = stepIndex;
                        setStepByElapsed(elapsed);
                        safeEvent("demo_prompt_change", { demo: DEMO_ID, page: PAGE_ID, step: steps[stepIndex].title });
                    }

                    remaining = newRemaining;
                    updateUI();

                    if (remaining <= 0) {
                        startBtn.disabled = false;
                        complete();
                    }
                }, 250);
            }

            // Audio toggle (no mid-run switching)
            audioToggle.addEventListener("click", () => {
                if (running) return;
                audioOn = !audioOn;
                audioToggle.textContent = audioOn ? "AUDIO: ON" : "AUDIO: OFF";
                if (!audioOn) stopAudioHard();
                safeEvent("demo_audio_toggle", { demo: DEMO_ID, page: PAGE_ID, state: audioOn ? "on" : "off" });
            });

            // Duration select
            durationSel.addEventListener("change", () => {
                if (running) return;
                setTotalFromSelector();
                reset();
            });

            // Start button
            startBtn.addEventListener("click", () => {
                if (!running && remaining === 0) reset();
                start();
            });

            // Link tracking
            document.addEventListener("click", (e) => {
                const a = e.target.closest("a[data-track]");
                if (!a) return;
                safeEvent(a.getAttribute("data-track"), { page: PAGE_ID, cta: a.getAttribute("data-cta") || "" });
            });

            // --- Checklist interactivity (localStorage) ---
            const STORAGE_KEY = "o2_listening_checks_v1";
            const checkGrid = document.getElementById("checkGrid");
            const resetChecks = document.getElementById("resetChecks");

            function loadChecks() {
                let saved = {};
                try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch (e) { }
                if (!checkGrid) return;
                checkGrid.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                    cb.checked = !!saved[cb.id];
                    cb.closest(".checkItem")?.classList.toggle("done", cb.checked);
                });
            }

            function saveChecks() {
                if (!checkGrid) return;
                const data = {};
                checkGrid.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                    data[cb.id] = cb.checked;
                });
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) { }
            }

            if (checkGrid) {
                checkGrid.addEventListener("change", (e) => {
                    const cb = e.target.closest('input[type="checkbox"]');
                    if (!cb) return;
                    cb.closest(".checkItem")?.classList.toggle("done", cb.checked);
                    saveChecks();
                    safeEvent("demo_noaudio_check", { demo: DEMO_ID, page: PAGE_ID, item: cb.id, state: cb.checked ? "checked" : "unchecked" });
                });
            }

            if (resetChecks) {
                resetChecks.addEventListener("click", () => {
                    if (!checkGrid) return;
                    checkGrid.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                        cb.checked = false;
                        cb.closest(".checkItem")?.classList.remove("done");
                    });
                    saveChecks();
                    safeEvent("demo_noaudio_reset", { demo: DEMO_ID, page: PAGE_ID });
                });
            }

            // Init
            safeEvent("demo_view", { demo: DEMO_ID, page: PAGE_ID });
            setTotalFromSelector();
            reset();
            loadChecks();
        })();
    </script>
</body>

</html>
